# mysql-fractalsql benchmark harness.
#
# Two services, each pinned to exactly one CPU so numbers are
# reproducible across machines with different core counts:
#
#   mysql   — runs the target server with the UDF pre-installed
#   tester  — Node.js 24 driver that issues the benchmark queries
#
# Parameterise the server version via env:
#   MYSQL_IMAGE=mysql:8.0 docker compose \
#       -f benchmark/docker-compose.test.yml up --abort-on-container-exit
#
# The .so is mounted from ../dist/<ARCH>/ so build.sh output flows
# through without rebuilding the image. One .so covers 8.0 / 8.4 / 9.x
# — the UDF ABI has been stable since MySQL 8.0.0.

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: fractal-bench-mysql
    cpus: 1.0
    cpuset: "0"
    mem_limit: 2g
    environment:
      MYSQL_ROOT_PASSWORD: fractal
      MYSQL_DATABASE: fractal
      MYSQL_ROOT_HOST: '%'
    volumes:
      - ../dist/${FRACTAL_ARCH:-amd64}/fractalsql.so:/usr/lib/mysql/plugin/fractalsql.so:ro
      - ../sql/install_udf.sql:/docker-entrypoint-initdb.d/01-install-udf.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pfractal --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - bench

  tester:
    image: node:24-bookworm-slim
    container_name: fractal-bench-tester
    cpus: 1.0
    cpuset: "1"
    mem_limit: 1g
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /tester
    volumes:
      - ./tester:/tester
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: fractal
      MYSQL_DATABASE: fractal
      BENCH_N: "1000"
      BENCH_DIM: "128"
      BENCH_K: "10"
      BENCH_ITERATIONS: "500"
    command: ["sh", "-c", "npm install --omit=dev && node run.js"]
    networks:
      - bench

networks:
  bench:
    driver: bridge
